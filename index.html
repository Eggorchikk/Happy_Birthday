<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Heart</title>

<style>
body {
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #f8d1c4;
    overflow: hidden;
}


#heart-anim {
    position: relative;
    width: 840px;
    height: 840px;
    margin-top: 70px;
}


#ha-birthday-text {
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Georgia', serif;
    font-size: 52px;
    color: #e24b4a;
    white-space: nowrap;
    opacity: 0;
    letter-spacing: 4px;
    transition: opacity 1.4s ease-in;
    text-shadow: 0 1px 12px #ffd6d6;
    pointer-events: none;
}

#ha-birthday-text.visible {
    opacity: 1;
}


.ha-gif {
    position: absolute;
    top: 34%;
    transform: translateY(-44%);
    width: 293px;
    height: 293px;
    object-fit: cover;
    border-radius: 24px;
    opacity: 0;
    transition: opacity 1s ease-in;
    display: none;
    box-shadow: 0 8px 28px rgba(0,0,0,0.18);
}

.ha-gif.visible {
    opacity: 1;
}

#ha-gif-left {
    left: -180px;
}

#ha-gif-right {
    right: -180px;
}


#ha-center-img {
    position: absolute;
    top: 41%;
    left: 50%;
    transform: translate(-50%, -44%);
    width: 176px;
    height: 176px;
    object-fit: cover;
    border-radius: calc(50%);
    border: 6px solid #fff;
    box-shadow: 0 2px 24px #e24b4a55;
    opacity: 0;
    transition: opacity 1.2s ease-in;
    display: none;
}

#ha-center-img.visible {
    opacity: 1;
}


#ha-plane {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
    z-index: 10;
}

#ha-canvas {
    position: absolute;
    top: 0;
    left: 0;
}
</style>
</head>

<body>

<div id="heart-anim">

    
    <span id="ha-birthday-text">✦ С Днём Рождения ✦</span>

    
    <img
        id="ha-gif-left"
        class="ha-gif"
        src="fireworks.gif"
        alt="celebration gif"
    />

    
    <img
        id="ha-gif-right"
        class="ha-gif"
        src="fireworks.gif"
        alt="celebration gif"
    />

   
    <canvas id="ha-canvas" width="840" height="840"></canvas>

    
    <svg id="ha-plane" width="840" height="840" viewBox="0 0 840 840">
        <g id="ha-plane-icon">

            <path
                d="M 0,-30 L 20,22 L 0,12 L -20,22 Z"
                fill="none"
                stroke="#e24b4a"
                stroke-width="4"
                stroke-linejoin="round"
                stroke-linecap="round"
            />

            <line
                x1="0"
                y1="-30"
                x2="0"
                y2="12"
                stroke="#e24b4a"
                stroke-width="2.5"
                stroke-linecap="round"
            />

        </g>
    </svg>

   
    <img
        id="ha-center-img"
        src="bilan.png"
        alt="center photo"
    />

</div>

<script>
(function () {

    const W = 840;


    const CX = 420;
    const CY = 330;

    const SCALE = 190;

    const STEPS = 300;

    function heartPoint(t) {

        const x =
            16 * Math.pow(Math.sin(t), 3);

        const y =
            -(
                13 * Math.cos(t)
                - 5 * Math.cos(2 * t)
                - 2 * Math.cos(3 * t)
                - Math.cos(4 * t)
            );

        return {
            x: CX + x * (SCALE / 16),
            y: CY + y * (SCALE / 13)
        };
    }

    const points = [];

    for (let i = 0; i <= STEPS; i++) {

        const t =
            (Math.PI / 2)
            + (i / STEPS) * 2 * Math.PI;

        points.push(heartPoint(t));
    }

    const canvas =
        document.getElementById('ha-canvas');

    const ctx =
        canvas.getContext('2d');

    const planeG =
        document.getElementById('ha-plane-icon');

    const bdText =
        document.getElementById('ha-birthday-text');

    const gifL =
        document.getElementById('ha-gif-left');

    const gifR =
        document.getElementById('ha-gif-right');

    const centerImg =
        document.getElementById('ha-center-img');

    let step = 0;

    function getAngle(i) {

        if (i <= 0) return 90;

        const a = points[i - 1];
        const b = points[i];

        return (
            Math.atan2(
                b.y - a.y,
                b.x - a.x
            ) * 180 / Math.PI
        ) + 90;
    }

    function drawFrame() {

        if (step > STEPS) {
            finish();
            return;
        }

        ctx.clearRect(0, 0, W, W);

        if (step > 0) {

            ctx.beginPath();

            ctx.moveTo(
                points[0].x,
                points[0].y
            );

            for (let k = 1; k <= step; k++) {

                ctx.lineTo(
                    points[k].x,
                    points[k].y
                );
            }

            ctx.strokeStyle = '#e24b4a';
            ctx.lineWidth = 6;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            ctx.stroke();
        }

        const p =
            points[Math.min(step, STEPS)];

        const deg =
            getAngle(Math.min(step, STEPS));

        planeG.setAttribute(
            'transform',
            `translate(${p.x},${p.y}) rotate(${deg})`
        );

        step++;

        requestAnimationFrame(drawFrame);
    }

    function finish() {

        ctx.clearRect(0, 0, W, W);

        ctx.beginPath();

        ctx.moveTo(
            points[0].x,
            points[0].y
        );

        for (let k = 1; k <= STEPS; k++) {

            ctx.lineTo(
                points[k].x,
                points[k].y
            );
        }

        ctx.fillStyle = '#e24b4a';
        ctx.fill();

        ctx.strokeStyle = '#c0392b';
        ctx.lineWidth = 4;

        ctx.stroke();

        planeG.setAttribute(
            'transform',
            'translate(-300,-300)'
        );

        
        setTimeout(() => {
            bdText.classList.add('visible');
        }, 100);

        
        setTimeout(() => {

            gifL.style.display = 'block';
            gifR.style.display = 'block';
            centerImg.style.display = 'block';

            requestAnimationFrame(() => {

                requestAnimationFrame(() => {

                    gifL.classList.add('visible');
                    gifR.classList.add('visible');
                    centerImg.classList.add('visible');

                });

            });

        }, 800);
    }

    planeG.setAttribute(
        'transform',
        `translate(${points[0].x},${points[0].y}) rotate(${getAngle(0)})`
    );

    drawFrame();

})();
</script>

</body>
</html>
